services:
  primary_system:
    image: postgres:16
    container_name: primary_system
    environment:
      POSTGRES_USER: primary_user
      POSTGRES_PASSWORD: primary_pass
      POSTGRES_DB: primary_system
    ports:
      - "5432:5432"
    volumes:
      - primary_system_data:/var/lib/postgresql/data
      - ./_primary_system/init/source-schema.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./_primary_system/data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primary_user -d primary_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./_primary_system/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      primary_system:
        condition: service_healthy

volumes:
  primary_system_data:
  pgadmin_data: